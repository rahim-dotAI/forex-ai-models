name: Trade Beacon v2.4.0 – Focused GBP Edition

# CHANGES v2.4.0:
# - GBPAUD permanently blocked (7t 0% WR -286p, MTF-supervised losses)
# - GBPCAD permanently blocked (6t 0% WR -259p, MTF-supervised losses)
# - European session delayed 08:00 → 09:30 UTC (London open noise zone)
#   08:00-09:30 UTC now treated as ASIAN (threshold 999 = blocked)
#   Config-driven: sessions.european_start_hour / european_start_minute
#
# CARRIED FROM v2.3.1-FIX:
# - Weekly MTF bug fixed: weekly is bonus-only, NEVER blocks signals
# - pandas FutureWarning fixed: resample('4h', offset='8h') lowercase
#
# CARRIED FROM v2.3.0-MTF-GEMINI:
# - Full MTF: 30m + 4h + Daily + Weekly on top of 1h filter
#   Daily is the decisive filter (blocked March 23 -318 pip day)
#   4h resampled from 1h with London-open offset (08:00 UTC)
#   Weekly: EMA12/26 only (EMA50 needs 1yr warmup on weekly bars)
# - Gemini 2.5 Flash for USD reasoning (NOT 2.0 Flash — retired March 2026)
#   Requires: GEMINI_API_KEY secret (free at aistudio.google.com)
#   FinBERT keeps as automatic fallback if key not set
# - by_mtf_confirmed analytics: WR when all TFs confirmed vs partial
# - by_gemini_bias analytics: WR when Gemini said BULLISH vs BEARISH
#
# CARRIED FROM v2.2.2-SAFE:
# - Cross-run pair daily cap (prevents same pair BUY+SELL same day)
# - EURUSD / EURGBP permanently blocked (data confirmed no edge)
# - Tier A blocked (0% WR, -107 pips — late entries on extended moves)
# - git merge -X ours push strategy (prevents parallel run conflicts)
# - Staleness guard: yfinance data rejected if last candle >60min old

on:
  schedule:
    - cron: "*/15 * * * 1-5"

  repository_dispatch:
    types: [trade-signal-check, performance-check]

  workflow_dispatch:
    inputs:
      sentiment:
        description: 'Enable Sentiment Analysis'
        required: false
        type: boolean
        default: false
      run_backtest:
        description: 'Run Backtest'
        required: false
        type: boolean
        default: false
      reset_performance:
        description: 'RESET PERFORMANCE (type YES to confirm)'
        required: false
        default: 'NO'
      allow_optimization:
        description: 'Allow threshold optimization'
        required: false
        type: boolean
        default: false
      force_run:
        description: 'Force run even on weekends/holidays'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.10"
  ENTRY_SCRIPT: "trade_beacon.py"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: trade-beacon-v2.4.0-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  forex-trading:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check if market is open
        id: market_check
        run: |
          echo "🕐 Checking market status..."

          CURRENT_DAY=$(date -u +%u)
          CURRENT_HOUR=$(date -u +%H)
          CURRENT_DATE=$(date -u +%Y-%m-%d)

          HOLIDAYS=(
            "2025-01-01" "2025-04-18" "2025-04-21" "2025-05-26"
            "2025-07-04" "2025-08-25" "2025-11-27" "2025-12-25" "2025-12-26"
            "2026-01-01" "2026-01-19" "2026-02-16" "2026-04-03" "2026-04-06"
            "2026-05-04" "2026-05-25" "2026-07-03" "2026-08-31"
            "2026-09-07" "2026-11-26" "2026-12-25" "2026-12-28"
            "2027-01-01" "2027-01-18" "2027-04-02" "2027-04-05"
            "2027-05-03" "2027-05-31" "2027-07-05" "2027-08-30"
            "2027-09-06" "2027-11-25" "2027-12-27" "2027-12-28"
          )

          IS_HOLIDAY=false
          for holiday in "${HOLIDAYS[@]}"; do
            if [ "$CURRENT_DATE" = "$holiday" ]; then
              IS_HOLIDAY=true
              echo "📅 Today is a forex market holiday: $holiday"
              break
            fi
          done

          IS_WEEKEND=false
          if [ "$CURRENT_DAY" -eq 5 ] && [ "$CURRENT_HOUR" -ge 22 ]; then
            IS_WEEKEND=true; echo "📅 Weekend: Friday after 22:00 UTC"
          elif [ "$CURRENT_DAY" -eq 6 ]; then
            IS_WEEKEND=true; echo "📅 Weekend: Saturday"
          elif [ "$CURRENT_DAY" -eq 7 ] && [ "$CURRENT_HOUR" -lt 22 ]; then
            IS_WEEKEND=true; echo "📅 Weekend: Sunday before 22:00 UTC"
          fi

          FORCE_RUN="${{ github.event.inputs.force_run }}"
          if [ "$IS_HOLIDAY" = "true" ] || [ "$IS_WEEKEND" = "true" ]; then
            if [ "$FORCE_RUN" = "true" ]; then
              echo "⚠️ Market closed but FORCE RUN enabled"
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "🛑 Market CLOSED - skipping"
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "✅ Market OPEN - proceeding"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Market Closed Notice
        if: steps.market_check.outputs.should_run == 'false'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🛑 FOREX MARKET CLOSED - SKIPPING ALL STEPS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Current time: $(date -u +"%Y-%m-%d %H:%M UTC")"
          echo "Market hours: Sunday 22:00 UTC - Friday 22:00 UTC"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Checkout repository
        if: steps.market_check.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Setup Python environment
        if: steps.market_check.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y jq

      - name: Verify critical files
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🔍 Verifying critical files..."
          for f in $ENTRY_SCRIPT requirements.txt performance_tracker.py config.json; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing critical file: $f"
              exit 1
            fi
          done
          echo "✅ All critical files present"
          mkdir -p signal_state
          python -m py_compile $ENTRY_SCRIPT
          python -m py_compile performance_tracker.py
          echo "✅ Python syntax validation passed"

      - name: Validate version alignment
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🔍 Validating version alignment..."
          TRACKER_VER=$(python -c "from performance_tracker import TRACKER_VERSION; print(TRACKER_VERSION)" 2>/dev/null || echo "unknown")
          BEACON_VER=$(grep -oP '"signal_generator_version":\s*"\K[^"]+' $ENTRY_SCRIPT | head -1 || echo "unknown")
          CONFIG_VER=$(jq -r '.version // "unknown"' config.json)

          echo "Tracker version: $TRACKER_VER"
          echo "Beacon version:  $BEACON_VER"
          echo "Config version:  $CONFIG_VER"

          if [[ "$BEACON_VER" == *"2.4"* ]] || [[ "$CONFIG_VER" == *"2.4"* ]]; then
            echo "✅ v2.4.0 detected"
          elif [[ "$BEACON_VER" == *"MTF-GEMINI"* ]] || [[ "$BEACON_VER" == *"FIX"* ]] || [[ "$BEACON_VER" == *"SAFE"* ]]; then
            echo "⚠️ Running prior version — upgrade to v2.4.0 recommended"
          elif [[ "$TRACKER_VER" != "$BEACON_VER" ]]; then
            echo "⚠️ Version mismatch (non-fatal — auto-migration will handle)"
          else
            echo "✅ Versions aligned: $TRACKER_VER"
          fi

      - name: Validate configuration
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🔍 Validating config.json..."
          jq empty config.json || exit 1

          CONFIG_VER=$(jq -r '.version // "unknown"' config.json)
          echo "Config version: $CONFIG_VER"
          if [[ "$CONFIG_VER" == *"2.4"* ]]; then
            echo "✅ Config version: v2.4.0"
          elif [[ "$CONFIG_VER" == *"MTF-GEMINI"* ]] || [[ "$CONFIG_VER" == *"FIX"* ]] || [[ "$CONFIG_VER" == *"SAFE"* ]]; then
            echo "⚠️ Config version recognised but older — upgrade to v2.4.0"
          else
            echo "⚠️ Config version not recognised"
          fi

          jq -e '.settings.aggressive'         config.json > /dev/null || { echo "❌ Missing aggressive settings"; exit 1; }
          jq -e '.settings.conservative'        config.json > /dev/null || { echo "❌ Missing conservative settings"; exit 1; }
          jq -e '.tiers'                         config.json > /dev/null || echo "⚠️ Tier thresholds not found"
          jq -e '.sessions'                      config.json > /dev/null || echo "⚠️ Sessions block not found (European delay not configured)"
          jq -e '.mtf_settings'                  config.json > /dev/null || echo "⚠️ MTF settings not found"
          jq -e '.gemini_usd_gate'               config.json > /dev/null || echo "⚠️ Gemini USD gate config not found"
          jq -e '.advanced.session_thresholds'   config.json > /dev/null || echo "⚠️ Session thresholds not found"
          jq -e '.advanced.pair_limits'           config.json > /dev/null || echo "⚠️ Pair limits not found"

          AGG_THRESH=$(jq -r  '.settings.aggressive.threshold // 55'    config.json)
          CONS_THRESH=$(jq -r '.settings.conservative.threshold // 57'  config.json)
          ATR_STOP=$(jq -r    '.settings.aggressive.atr_stop_multiplier // 2.5' config.json)
          GBPAUD_LIMIT=$(jq -r '.advanced.pair_limits.GBPAUD // "?"'     config.json)
          GBPCAD_LIMIT=$(jq -r '.advanced.pair_limits.GBPCAD // "?"'     config.json)
          EU_HOUR=$(jq -r     '.sessions.european_start_hour // 9'       config.json)
          EU_MIN=$(jq -r      '.sessions.european_start_minute // 30'    config.json)

          echo "✅ Thresholds: Aggressive=$AGG_THRESH, Conservative=$CONS_THRESH"
          echo "✅ ATR Stop: ${ATR_STOP}x"
          echo "✅ European session start: ${EU_HOUR}:$(printf '%02d' $EU_MIN) UTC"
          echo "✅ GBPAUD limit: $GBPAUD_LIMIT | GBPCAD limit: $GBPCAD_LIMIT"

          if [ "$GBPAUD_LIMIT" != "0" ] || [ "$GBPCAD_LIMIT" != "0" ]; then
            echo "⚠️ GBPAUD/GBPCAD not set to 0 in pair_limits — check config.json"
          else
            echo "✅ GBPAUD + GBPCAD permanently blocked (pair_limits = 0)"
          fi

          if [ ! -f config.runtime.base.json ]; then
            cp config.json config.runtime.base.json
            git add config.runtime.base.json 2>/dev/null || true
            echo "📸 Created config baseline snapshot"
          fi

          echo "✅ Configuration valid (v2.4.0)"

      - name: Reset performance history
        if: github.event.inputs.reset_performance == 'YES'
        run: |
          echo "⚠️ PERFORMANCE RESET INITIATED"
          rm -f signal_state/signal_history.json
          rm -f signal_state/last_optimization.json
          rm -f signal_state/dashboard_state.json
          rm -f signal_state/trading_paused.json
          echo "🔥 PERFORMANCE RESET COMPLETE"

      - name: Clean stale pause files
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          if [ -f signal_state/trading_paused.json ]; then
            PAUSED_UNTIL=$(jq -r '.paused_until // "unknown"' signal_state/trading_paused.json)
            if [ "$PAUSED_UNTIL" != "unknown" ]; then
              PAUSE_TS=$(date -d "$PAUSED_UNTIL" +%s 2>/dev/null || echo "0")
              NOW_TS=$(date +%s)
              if [ "$NOW_TS" -gt "$PAUSE_TS" ]; then
                echo "⚠️ Expired pause file (until: $PAUSED_UNTIL) — removing"
                rm -f signal_state/trading_paused.json
                echo "✅ Stale pause file removed"
              else
                echo "⏸️ Valid pause active until: $PAUSED_UNTIL"
              fi
            fi
          else
            echo "✅ No pause file present"
          fi

      - name: Apply runtime overrides
        if: github.event.inputs.sentiment == 'true'
        run: |
          SENTIMENT="${{ github.event.inputs.sentiment }}"
          [ -z "$SENTIMENT" ] && SENTIMENT="false"
          jq --argjson sentiment "$SENTIMENT" '.use_sentiment = $sentiment' \
            config.json > tmp.json && mv tmp.json config.json
          echo "✅ Configuration updated: sentiment=$SENTIMENT"

      - name: Allow threshold optimization
        if: github.event.inputs.allow_optimization == 'true'
        run: |
          jq '.performance_tuning.auto_adjust_thresholds = true' \
            config.json > tmp.json && mv tmp.json config.json
          rm -f signal_state/last_optimization.json
          MIN_TRADES=$(jq -r '.performance_tuning.min_trades_for_optimization // 50' config.json)
          CURRENT_TRADES=$(jq -r '.stats.total_trades // 0' signal_state/signal_history.json 2>/dev/null || echo "0")
          echo "✅ Optimization enabled | Trades: $CURRENT_TRADES / $MIN_TRADES required"

      - name: Pre-run health check
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🏥 Pre-flight health check..."

          if [ -f signal_state/trading_paused.json ]; then
            PAUSED_UNTIL=$(jq -r '.paused_until // "unknown"' signal_state/trading_paused.json)
            echo "⛔ Trading paused until: $PAUSED_UNTIL"
            echo "paused" > signal_state/run_status.txt
            exit 0
          fi

          if [ -f signal_state/signal_history.json ]; then
            echo "📊 Current Performance:"
            jq -r '.stats | "Total: \(.total_trades // 0) | WR: \(.win_rate // 0)% | Pips: \(.total_pips // 0) | Expectancy: \(.expectancy_pips // 0)"' \
              signal_state/signal_history.json || echo "No stats yet"

            if jq -e '.stats.by_mode' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "📊 By Mode:"
              echo "  Aggressive:   $(jq -r '.stats.by_mode.aggressive.trades // 0' signal_state/signal_history.json) trades, $(jq -r '.stats.by_mode.aggressive.win_rate // 0' signal_state/signal_history.json)% WR"
              echo "  Conservative: $(jq -r '.stats.by_mode.conservative.trades // 0' signal_state/signal_history.json) trades, $(jq -r '.stats.by_mode.conservative.win_rate // 0' signal_state/signal_history.json)% WR"
            fi

            if jq -e '.analytics.by_pair' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "💱 Pair Performance:"
              jq -r '.analytics.by_pair // {} | to_entries | sort_by(-.value.total_pips) | .[] |
                "  \(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json 2>/dev/null || echo "  No pair data"
            fi

            if jq -e '.analytics.by_mtf_confirmed' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🔀 MTF Confirmation:"
              jq -r '.analytics.by_mtf_confirmed // {} | to_entries[] |
                "  [\(.key)]: \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json 2>/dev/null || echo "  No MTF data yet"
            fi

            if jq -e '.analytics.by_gemini_bias' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🤖 Gemini USD Bias:"
              jq -r '.analytics.by_gemini_bias // {} | to_entries[] |
                "  [\(.key)]: \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json 2>/dev/null || echo "  No Gemini data yet"
            fi
          fi
          echo ""
          echo "✅ Pre-flight check complete"

      - name: Display active configuration
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 ACTIVE CONFIGURATION — v2.4.0 FOCUSED GBP"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          echo ""
          echo "[v2.4.0 Changes]"
          echo "  GBPAUD: $(jq -r '.advanced.pair_limits.GBPAUD // "?"' config.json) (permanently blocked — 7t 0% WR -286p)"
          echo "  GBPCAD: $(jq -r '.advanced.pair_limits.GBPCAD // "?"' config.json) (permanently blocked — 6t 0% WR -259p)"
          EU_H=$(jq -r '.sessions.european_start_hour // 9' config.json)
          EU_M=$(jq -r '.sessions.european_start_minute // 30' config.json)
          printf "  European session start: %02d:%02d UTC (08:00-09:30 = ASIAN/blocked)\n" $EU_H $EU_M
          echo ""

          echo "[Signal Modes]"
          echo "  Aggressive:   Score>=$(jq -r '.settings.aggressive.threshold' config.json) ADX>=$(jq -r '.settings.aggressive.min_adx' config.json)"
          echo "  Conservative: Score>=$(jq -r '.settings.conservative.threshold' config.json) ADX>=$(jq -r '.settings.conservative.min_adx' config.json)"
          echo "  ATR Stop: $(jq -r '.settings.aggressive.atr_stop_multiplier' config.json)x | ATR Target: $(jq -r '.settings.aggressive.atr_target_multiplier' config.json)x"
          echo ""

          echo "[MTF Settings — v2.3.0/v2.3.1]"
          echo "  Require 30m:    $(jq -r '.mtf_settings.require_30m // true' config.json)"
          echo "  Require 4h:     $(jq -r '.mtf_settings.require_4h // true' config.json)"
          echo "  Require Daily:  $(jq -r '.mtf_settings.require_daily // true' config.json) ← DECISIVE FILTER"
          echo "  Require Weekly: $(jq -r '.mtf_settings.require_weekly // false' config.json) (bonus only — never blocks)"
          echo "  4h anchor:      08:00 UTC (London open)"
          echo "  Weekly EMA:     EMA12/26 only (EMA50 needs 1yr warmup)"
          echo ""

          echo "[Gemini USD Gate — v2.3.0]"
          echo "  Model: $(jq -r '.gemini_usd_gate.model // "gemini-2.5-flash"' config.json)"
          echo "  Cache TTL: $(jq -r '.gemini_usd_gate.cache_minutes // 60' config.json) min"
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "  Status: ✅ ACTIVE (Gemini 2.5 Flash)"
          else
            echo "  Status: ❌ DISABLED — add GEMINI_API_KEY secret at aistudio.google.com"
            [ -n "$HF_API_KEY" ] && echo "  Fallback: FinBERT (HF_API_KEY present)" || echo "  Fallback: ❌ None — USD signals blocked (safe default)"
          fi
          echo "  Logic: BULLISH→allow BUY USD | BEARISH→allow SELL USD | NEUTRAL→block all"
          echo ""

          echo "[Tier Thresholds]"
          echo "  A+: ≥$(jq -r '.tiers.A_plus_min_score // 80' config.json) (elite)"
          echo "  A:  ≥$(jq -r '.tiers.A_min_score // 72' config.json)  BLOCKED — 0% WR, -107 pips"
          echo "  B:  ≥$(jq -r '.tiers.B_min_score // 55' config.json)  ACTIVE — main trading tier"
          echo "  C:  below B — BLOCKED"
          echo ""

          echo "[Permanently Blocked Pairs]"
          echo "  EURUSD: $(jq -r '.advanced.pair_limits.EURUSD // 0' config.json) — 7t 0% WR -177p"
          echo "  EURGBP: $(jq -r '.advanced.pair_limits.EURGBP // 0' config.json) — no edge"
          echo "  GBPAUD: $(jq -r '.advanced.pair_limits.GBPAUD // 0' config.json) — 7t 0% WR -286p (v2.4.0)"
          echo "  GBPCAD: $(jq -r '.advanced.pair_limits.GBPCAD // 0' config.json) — 6t 0% WR -259p (v2.4.0)"
          echo ""

          echo "[Active Pair Caps]"
          echo "  GBPUSD: max $(jq -r '.advanced.pair_limits.GBPUSD // 5' config.json) (BUY-only)"
          echo "  GBPJPY: max $(jq -r '.advanced.pair_limits.GBPJPY // 1' config.json)"
          echo "  USD pairs: US session only + Gemini gate"
          echo ""

          echo "[Risk Management]"
          echo "  Max Daily Risk: $(jq -r '.risk_management.max_daily_risk_pips' config.json) pips"
          echo "  Max Open:       $(jq -r '.risk_management.max_open_positions' config.json)"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}

      - name: Run Trade Beacon v2.4.0
        if: steps.market_check.outputs.should_run == 'true'
        env:
          NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
          MARKETAUX_API_KEY:  ${{ secrets.MARKETAUX_API_KEY }}
          HF_API_KEY:         ${{ secrets.HF_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          BROWSERLESS_TOKEN:  ${{ secrets.BROWSERLESS_TOKEN }}
        run: |
          echo "🚀 Starting Trade Beacon v2.4.0 — Focused GBP Edition..."
          python $ENTRY_SCRIPT
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Trade Beacon exited with error: $EXIT_CODE"
            exit $EXIT_CODE
          fi
          echo "✅ Trade Beacon completed successfully"

          if [ -f signal_state/dashboard_state.json ]; then
            echo ""
            echo "📊 Signal Breakdown:"
            AGG=$(jq -r  '.active_signals_by_mode.aggressive // 0'  signal_state/dashboard_state.json)
            CONS=$(jq -r '.active_signals_by_mode.conservative // 0' signal_state/dashboard_state.json)
            SESS=$(jq -r '.session // "?"'                           signal_state/dashboard_state.json)
            ENG=$(jq -r  '.gemini_engine // "disabled"'              signal_state/dashboard_state.json)
            EU_START=$(jq -r '.system.european_session_start // "09:30 UTC"' signal_state/dashboard_state.json)
            echo "  Aggressive:   $AGG signals"
            echo "  Conservative: $CONS signals"
            echo "  Session:      $SESS"
            echo "  USD Engine:   $ENG"
            echo "  EU Start:     $EU_START"
          fi

      - name: Validate output files
        if: always()
        run: |
          echo "🔍 Validating output files..."
          if [ -f signal_state/dashboard_state.json ]; then
            jq empty signal_state/dashboard_state.json || exit 1
            VER=$(jq -r '.system.version // "unknown"' signal_state/dashboard_state.json)
            ENG=$(jq -r '.gemini_engine // "disabled"'  signal_state/dashboard_state.json)
            BLOCKED=$(jq -r '.system.permanently_blocked // [] | join(", ")' signal_state/dashboard_state.json 2>/dev/null || echo "unknown")
            echo "✅ Dashboard valid | version=$VER | USD engine=$ENG"
            echo "   Permanently blocked: $BLOCKED"
          else
            echo "⚠️ Dashboard state not found"
          fi

          if [ -f signal_state/health.json ]; then
            jq empty signal_state/health.json || exit 1
            STATUS=$(jq -r '.status // "unknown"' signal_state/health.json)
            echo "📊 Health: $STATUS"
          fi

          if [ -f signal_state/economic_calendar_cache.json ]; then
            COUNT=$(jq -r '.events | length' signal_state/economic_calendar_cache.json 2>/dev/null || echo "0")
            echo "📅 Calendar: $COUNT high-impact events cached"
          fi

      - name: Performance summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 TRADE BEACON v2.4.0 PERFORMANCE SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ -f signal_state/signal_history.json ]; then
            echo ""
            echo "📈 Overall:"
            jq -r '.stats | "Total: \(.total_trades // 0) | WR: \(.win_rate // 0)% | Pips: \(.total_pips // 0) | Expectancy: \(.expectancy_pips // 0) pips/trade"' \
              signal_state/signal_history.json || echo "No stats"

            if jq -e '.stats.by_mode' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🎯 By Mode:"
              jq -r '.stats.by_mode // {} | to_entries[] |
                "\(.key | ascii_upcase): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json || echo "No mode data"
            fi

            if jq -e '.analytics.by_tier' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🏆 By Tier (A+≥80, A≥72 BLOCKED, B≥55):"
              jq -r '.analytics.by_tier // {} | to_entries | sort_by(.key) | .[] |
                "Tier \(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json || echo "No tier data"
            fi

            echo ""
            echo "💱 By Pair (sorted by pips):"
            jq -r '.analytics.by_pair // {} | to_entries | sort_by(-.value.total_pips) | .[] |
              "\(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json || echo "No pair data"

            echo ""
            echo "📊 By Session:"
            jq -r '.analytics.by_session // {} | to_entries[] |
              "\(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json || echo "No session data"

            if jq -e '.analytics.by_mtf_confirmed' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🔀 MTF Confirmation:"
              jq -r '.analytics.by_mtf_confirmed // {} | to_entries[] |
                "  [\(.key)]: \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json 2>/dev/null || echo "  No MTF data yet"
            fi

            if jq -e '.analytics.by_gemini_bias' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🤖 Gemini USD Bias:"
              jq -r '.analytics.by_gemini_bias // {} | to_entries[] |
                "  [\(.key)]: \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json 2>/dev/null || echo "  No Gemini data yet"
            fi

            if jq -e '.analytics.cross_analytics.tier_by_session' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🔀 Tier × Session (best cells):"
              jq -r '.analytics.cross_analytics.tier_by_session // {} | to_entries | sort_by(-.value.total_pips) | .[:6] | .[] |
                "Tier \(.value.tier) in \(.value.session): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json || echo "No cross-analytics"
            fi
          else
            echo "⚠️ No performance history yet"
          fi

          echo ""
          if [ -f signal_state/dashboard_state.json ]; then
            echo "🔔 Active Signals:"
            echo "  Total:        $(jq -r '.active_signals // 0' signal_state/dashboard_state.json)"
            echo "  Aggressive:   $(jq -r '.active_signals_by_mode.aggressive // 0' signal_state/dashboard_state.json)"
            echo "  Conservative: $(jq -r '.active_signals_by_mode.conservative // 0' signal_state/dashboard_state.json)"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Check for alerts
        if: always()
        run: |
          if [ -f signal_state/health.json ]; then
            STATUS=$(jq -r '.status // "unknown"' signal_state/health.json)
            if [ "$STATUS" = "paused" ]; then
              echo "⚠️ ALERT: Trading PAUSED"
              jq -r '.issues // [] | .[]' signal_state/health.json || true
            elif [ "$STATUS" = "warning" ]; then
              echo "⚠️ WARNING:"
              jq -r '.issues // [] | .[]' signal_state/health.json || true
            elif [ "$STATUS" != "ok" ]; then
              echo "❌ ERROR: $STATUS"
              jq -r '.issues // [] | .[]' signal_state/health.json || true
            fi
          fi

      - name: Commit state changes
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          git config user.name  "Trade Beacon v2.4.0 [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add signal_state/*.json signal_state/last_run.txt signal_state/last_success.txt \
                  config.json config.runtime.base.json signals.csv 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            TOTAL=$(jq -r     '.active_signals // 0'                      signal_state/dashboard_state.json 2>/dev/null || echo "0")
            AGG=$(jq -r       '.active_signals_by_mode.aggressive // 0'   signal_state/dashboard_state.json 2>/dev/null || echo "0")
            CONS=$(jq -r      '.active_signals_by_mode.conservative // 0' signal_state/dashboard_state.json 2>/dev/null || echo "0")
            SESSION=$(jq -r   '.session // "UNKNOWN"'                     signal_state/dashboard_state.json 2>/dev/null || echo "UNKNOWN")
            ENGINE=$(jq -r    '.gemini_engine // "disabled"'              signal_state/dashboard_state.json 2>/dev/null || echo "disabled")

            git commit -m "📊 Trade Beacon v2.4.0 [$TIMESTAMP]

            Session: $SESSION | USD: $ENGINE
            Signals: $TOTAL (Agg: $AGG, Cons: $CONS)
            Run: #${{ github.run_number }}

            [skip ci]"

            echo "✅ Changes committed"
          fi

      - name: Push changes
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          git fetch origin main
          git merge -X ours origin/main --no-edit 2>/dev/null || {
            echo "⚠️ Merge failed — force-with-lease fallback"
            git merge --abort 2>/dev/null || true
            git push --force-with-lease origin HEAD:main || {
              echo "⚠️ Force push also failed — will retry next run"
              exit 0
            }
            echo "✅ Changes pushed (force)"
            exit 0
          }
          git push origin HEAD:main || {
            echo "⚠️ Push failed — will retry next run"
            exit 0
          }
          echo "✅ Changes pushed"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        if: steps.market_check.outputs.should_run == 'true'
        with:
          name: trade-beacon-v2.4.0-run-${{ github.run_number }}
          path: |
            signal_state/
            signals.csv
            config.json
          retention-days: 30
          compression-level: 9
