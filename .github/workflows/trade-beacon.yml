name: Trade Beacon v2.5.0-1H-EXIT – Forex Signal Generator

# CHANGES v2.5.0-1H-EXIT:
# - LAYERED EXIT EDITION: 1H timeframe + partial TP + 2h time stop + momentum check
# - Signal timeframe: 15m → 1h (filters noise, aligns with signal edge window)
# - SL: 2.5x → 2.0x ATR (1h ATR is larger; tighter multiplier, appropriate pip distance)
# - TP1: 2.5x ATR partial profit lock (replaces 7x full target that was rarely hit)
# - Time stop: 2h hard close on remainder (entropy control — edge expires by hour 3+)
# - Momentum check: 45-min dead trade exit if <10 pips movement in direction
# - Session end guard: no new signals if <2h remain in session
#   EUROPEAN: no new signals after 11:00 UTC | US: no new signals after 19:00 UTC
# - MTF updated: 30m + 1h removed (now signal timeframe). Only 4h + Daily + Weekly.
# - New performance analytics: by_exit_reason tracks tp1_hit / TIME_EXIT / MOMENTUM_EXIT
#
# CARRIED FROM v2.4.0:
# - GBPAUD + GBPCAD permanently blocked (data confirmed: 0% WR combined)
# - European session start: 09:30 UTC
# - GBPUSD BUY-only directional filter
# - Gemini 2.5 Flash USD gate (NOT 2.0-flash — retired March 3 2026)
# - Calendar blackout (Forex Factory)
# - Cross-run pair daily cap
# - git merge -X ours push strategy
# - Staleness guard (rejects stale yfinance data)

on:
  schedule:
    - cron: "*/15 * * * 1-5"

  repository_dispatch:
    types: [trade-signal-check, performance-check]

  workflow_dispatch:
    inputs:
      sentiment:
        description: 'Enable Sentiment Analysis'
        required: false
        type: boolean
        default: false

      reset_performance:
        description: 'RESET PERFORMANCE (type YES to confirm)'
        required: false
        default: 'NO'

      allow_optimization:
        description: 'ALLOW threshold optimization'
        required: false
        type: boolean
        default: false

      force_run:
        description: 'Force run even on weekends/holidays'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.10"
  ENTRY_SCRIPT: "trade_beacon.py"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: trade-beacon-v2.5.0-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  forex-trading:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check if market is open
        id: market_check
        run: |
          echo "🕐 Checking market status..."

          CURRENT_DAY=$(date -u +%u)
          CURRENT_HOUR=$(date -u +%H)
          CURRENT_DATE=$(date -u +%Y-%m-%d)

          HOLIDAYS=(
            "2025-01-01" "2025-04-18" "2025-04-21" "2025-05-26"
            "2025-07-04" "2025-08-25" "2025-11-27" "2025-12-25" "2025-12-26"
            "2026-01-01" "2026-01-19" "2026-02-16" "2026-04-03" "2026-04-06"
            "2026-05-04" "2026-05-25" "2026-07-03" "2026-08-31"
            "2026-09-07" "2026-11-26" "2026-12-25" "2026-12-28"
            "2027-01-01" "2027-01-18" "2027-04-02" "2027-04-05"
            "2027-05-03" "2027-05-31" "2027-07-05" "2027-08-30"
            "2027-09-06" "2027-11-25" "2027-12-27" "2027-12-28"
          )

          IS_HOLIDAY=false
          for holiday in "${HOLIDAYS[@]}"; do
            if [ "$CURRENT_DATE" = "$holiday" ]; then
              IS_HOLIDAY=true
              echo "📅 Today is a forex market holiday: $holiday"
              break
            fi
          done

          IS_WEEKEND=false
          if [ "$CURRENT_DAY" -eq 5 ] && [ "$CURRENT_HOUR" -ge 22 ]; then
            IS_WEEKEND=true; echo "📅 Weekend: Friday after 22:00 UTC"
          elif [ "$CURRENT_DAY" -eq 6 ]; then
            IS_WEEKEND=true; echo "📅 Weekend: Saturday"
          elif [ "$CURRENT_DAY" -eq 7 ] && [ "$CURRENT_HOUR" -lt 22 ]; then
            IS_WEEKEND=true; echo "📅 Weekend: Sunday before 22:00 UTC"
          fi

          FORCE_RUN="${{ github.event.inputs.force_run }}"
          if [ "$IS_HOLIDAY" = "true" ] || [ "$IS_WEEKEND" = "true" ]; then
            if [ "$FORCE_RUN" = "true" ]; then
              echo "⚠️ Market closed but FORCE RUN enabled"
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "🛑 Market CLOSED - skipping"
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "✅ Market OPEN - proceeding"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Market Closed Notice
        if: steps.market_check.outputs.should_run == 'false'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🛑 FOREX MARKET CLOSED - SKIPPING ALL STEPS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Current time: $(date -u +"%Y-%m-%d %H:%M UTC")"

      - name: Checkout repository
        if: steps.market_check.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Setup Python environment
        if: steps.market_check.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y jq

      - name: Verify system files
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🔍 Verifying critical files..."
          for f in $ENTRY_SCRIPT requirements.txt performance_tracker.py config.json; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing critical file: $f"
              exit 1
            fi
          done
          echo "✅ All critical files present"
          mkdir -p signal_state
          python -m py_compile $ENTRY_SCRIPT
          python -m py_compile performance_tracker.py
          echo "✅ Python syntax validation passed"

      - name: Validate version alignment
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🔍 Validating version alignment..."
          TRACKER_VER=$(python -c "from performance_tracker import TRACKER_VERSION; print(TRACKER_VERSION)" 2>/dev/null || echo "unknown")
          BEACON_VER=$(grep -oP '"signal_generator_version":\s*"\K[^"]+' $ENTRY_SCRIPT | head -1 || echo "unknown")
          CONFIG_VER=$(jq -r '.version // "unknown"' config.json)

          echo "Tracker version: $TRACKER_VER"
          echo "Beacon version:  $BEACON_VER"
          echo "Config version:  $CONFIG_VER"

          if [[ "$BEACON_VER" == *"2.5"* ]] || [[ "$CONFIG_VER" == *"2.5"* ]]; then
            echo "✅ v2.5.0-1H-EXIT detected"
          elif [[ "$TRACKER_VER" != "$BEACON_VER" ]]; then
            echo "⚠️ Version mismatch (non-fatal — auto-migration handles)"
          else
            echo "✅ Versions aligned: $TRACKER_VER"
          fi

      - name: Validate configuration
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🔍 Validating config.json..."
          jq empty config.json || exit 1

          CONFIG_VER=$(jq -r '.version // "unknown"' config.json)
          echo "Config version: $CONFIG_VER"
          if [[ "$CONFIG_VER" == *"2.5"* ]]; then
            echo "✅ Config version: v2.5.0-1H-EXIT"
          else
            echo "⚠️ Config version not v2.5.0 — please update config.json"
          fi

          jq -e '.settings.aggressive'           config.json > /dev/null || { echo "❌ Missing aggressive settings"; exit 1; }
          jq -e '.settings.conservative'          config.json > /dev/null || { echo "❌ Missing conservative settings"; exit 1; }
          jq -e '.exit_rules'                     config.json > /dev/null || echo "⚠️ exit_rules not found — using defaults"
          jq -e '.mtf_settings'                   config.json > /dev/null || echo "⚠️ mtf_settings not found"
          jq -e '.sessions'                       config.json > /dev/null || echo "⚠️ sessions block not found"
          jq -e '.gemini_usd_gate'                config.json > /dev/null || echo "⚠️ gemini_usd_gate not found"
          jq -e '.advanced.session_thresholds'    config.json > /dev/null || echo "⚠️ session_thresholds not found"
          jq -e '.advanced.pair_limits'           config.json > /dev/null || echo "⚠️ pair_limits not found"

          AGG_THRESH=$(jq -r  '.settings.aggressive.threshold // 55'           config.json)
          CONS_THRESH=$(jq -r '.settings.conservative.threshold // 57'         config.json)
          ATR_STOP=$(jq -r   '.settings.aggressive.atr_stop_multiplier // 2.0' config.json)
          ATR_TP1=$(jq -r    '.settings.aggressive.atr_tp1_multiplier // 2.5'  config.json)
          TIME_STOP=$(jq -r  '.exit_rules.time_stop_minutes // 120'            config.json)
          MOMENTUM=$(jq -r   '.exit_rules.momentum_check_minutes // 45'        config.json)
          SESS_GUARD=$(jq -r '.exit_rules.session_min_remaining_minutes // 120' config.json)
          EU_H=$(jq -r       '.sessions.european_start_hour // 9'              config.json)
          EU_M=$(jq -r       '.sessions.european_start_minute // 30'           config.json)
          GBPAUD_LIM=$(jq -r '.advanced.pair_limits.GBPAUD // 0'               config.json)
          GBPCAD_LIM=$(jq -r '.advanced.pair_limits.GBPCAD // 0'               config.json)
          GEMINI_MDL=$(jq -r '.gemini_usd_gate.model // "gemini-2.5-flash"'    config.json)

          echo "✅ Thresholds: Aggressive=$AGG_THRESH, Conservative=$CONS_THRESH"
          echo "✅ ATR Stop: ${ATR_STOP}x | ATR TP1: ${ATR_TP1}x"
          echo "✅ Time stop: ${TIME_STOP}min | Momentum check: ${MOMENTUM}min | Session guard: ${SESS_GUARD}min"
          printf "✅ European session start: %02d:%02d UTC\n" "$EU_H" "$EU_M"
          echo "✅ GBPAUD limit: $GBPAUD_LIM | GBPCAD limit: $GBPCAD_LIM"
          if [ "$GBPAUD_LIM" = "0" ] && [ "$GBPCAD_LIM" = "0" ]; then
            echo "✅ GBPAUD + GBPCAD permanently blocked (pair_limits = 0)"
          fi
          echo "✅ Gemini model: $GEMINI_MDL"

          if [ ! -f config.runtime.base.json ]; then
            cp config.json config.runtime.base.json
            git add config.runtime.base.json 2>/dev/null || true
            echo "📸 Created config baseline snapshot"
          fi

          echo "✅ Configuration valid (v2.5.0-1H-EXIT)"

      - name: Reset performance history (DESTRUCTIVE)
        if: github.event.inputs.reset_performance == 'YES'
        run: |
          echo "⚠️ PERFORMANCE RESET INITIATED"
          rm -f signal_state/signal_history.json
          rm -f signal_state/last_optimization.json
          rm -f signal_state/dashboard_state.json
          rm -f signal_state/trading_paused.json
          echo "🔥 PERFORMANCE RESET COMPLETE - All history cleared"

      - name: Clean stale pause files
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          if [ -f signal_state/trading_paused.json ]; then
            PAUSED_UNTIL=$(jq -r '.paused_until // "unknown"' signal_state/trading_paused.json)
            if [ "$PAUSED_UNTIL" != "unknown" ]; then
              PAUSE_TS=$(date -d "$PAUSED_UNTIL" +%s 2>/dev/null || echo "0")
              NOW_TS=$(date +%s)
              if [ "$NOW_TS" -gt "$PAUSE_TS" ]; then
                rm -f signal_state/trading_paused.json
                echo "✅ Stale pause file removed (was until: $PAUSED_UNTIL)"
              else
                echo "⏸️ Valid pause active until: $PAUSED_UNTIL"
              fi
            fi
          else
            echo "✅ No pause file present"
          fi

      - name: Apply runtime overrides
        if: github.event.inputs.sentiment == 'true'
        run: |
          SENTIMENT="${{ github.event.inputs.sentiment }}"
          [ -z "$SENTIMENT" ] && SENTIMENT="false"
          jq --argjson sentiment "$SENTIMENT" '.use_sentiment = $sentiment' \
            config.json > tmp.json && mv tmp.json config.json
          echo "✅ Sentiment override: $SENTIMENT"

      - name: Allow threshold optimization
        if: github.event.inputs.allow_optimization == 'true'
        run: |
          jq '.performance_tuning.auto_adjust_thresholds = true' \
            config.json > tmp.json && mv tmp.json config.json
          rm -f signal_state/last_optimization.json
          echo "✅ Optimization enabled"

      - name: Pre-run health check
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🏥 Pre-flight health check..."

          if [ -f signal_state/trading_paused.json ]; then
            PAUSED_UNTIL=$(jq -r '.paused_until // "unknown"' signal_state/trading_paused.json)
            echo "⛔ Trading paused until: $PAUSED_UNTIL"
            exit 0
          fi

          if [ -f signal_state/signal_history.json ]; then
            echo "📊 Current Performance:"
            jq -r '.stats | "Total: \(.total_trades // 0) | WR: \(.win_rate // 0)% | Pips: \(.total_pips // 0) | Expectancy: \(.expectancy_pips // 0)"' \
              signal_state/signal_history.json || echo "No stats yet"

            echo ""
            echo "📊 By Mode:"
            echo "  Aggressive:   $(jq -r '.stats.by_mode.aggressive.trades // 0' signal_state/signal_history.json) trades, $(jq -r '.stats.by_mode.aggressive.win_rate // 0' signal_state/signal_history.json)% WR"
            echo "  Conservative: $(jq -r '.stats.by_mode.conservative.trades // 0' signal_state/signal_history.json) trades, $(jq -r '.stats.by_mode.conservative.win_rate // 0' signal_state/signal_history.json)% WR"

            echo ""
            echo "💱 Pair Performance:"
            jq -r '.analytics.by_pair // {} | to_entries | sort_by(-.value.total_pips) | .[] |
              "  \(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json 2>/dev/null || echo "  No pair data"

            if jq -e '.analytics.by_exit_reason' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🚪 Exit Reason Breakdown (v2.5.0):"
              jq -r '.analytics.by_exit_reason // {} | to_entries[] |
                "  [\(.key)]: \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json 2>/dev/null || echo "  No exit data yet (populates as v2.5.0 signals resolve)"
            fi

            if jq -e '.analytics.by_mtf_confirmed' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🔀 MTF Confirmation:"
              jq -r '.analytics.by_mtf_confirmed // {} | to_entries[] |
                "  [\(.key)]: \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json 2>/dev/null || echo "  No MTF data yet"
            fi
          fi

          echo ""
          echo "✅ Pre-flight check complete"

      - name: Display active configuration
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 ACTIVE CONFIGURATION — v2.5.0-1H-EXIT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          echo "[v2.5.0 Changes — Layered Exit]"
          echo "  Timeframe:       1H (was 15m)"
          echo "  SL:              $(jq -r '.settings.aggressive.atr_stop_multiplier // 2.0' config.json)x ATR (was 2.5x)"
          echo "  TP1:             $(jq -r '.settings.aggressive.atr_tp1_multiplier // 2.5' config.json)x ATR (partial profit lock)"
          echo "  Time stop:       $(jq -r '.exit_rules.time_stop_minutes // 120' config.json)min hard close on remainder"
          echo "  Momentum check:  $(jq -r '.exit_rules.momentum_check_minutes // 45' config.json)min — exit if <$(jq -r '.exit_rules.momentum_min_pips // 10' config.json) pips movement"
          echo "  Session guard:   No new signals if <$(jq -r '.exit_rules.session_min_remaining_minutes // 120' config.json)min remain in session"
          echo "  EUROPEAN guard:  Fires at 11:00 UTC (session ends 13:00)"
          echo "  US guard:        Fires at 19:00 UTC (session ends 21:00)"
          echo ""

          echo "[Signal Modes]"
          echo "  Aggressive:   Score>=$(jq -r '.settings.aggressive.threshold' config.json) ADX>=$(jq -r '.settings.aggressive.min_adx' config.json)"
          echo "  Conservative: Score>=$(jq -r '.settings.conservative.threshold' config.json) ADX>=$(jq -r '.settings.conservative.min_adx' config.json)"
          echo "  Min R:R:      $(jq -r '.settings.aggressive.min_risk_reward // 1.2' config.json) (TP1/SL = 2.5/2.0)"
          echo ""

          echo "[MTF Settings — v2.5.0]"
          echo "  Require 4h:     $(jq -r '.mtf_settings.require_4h // true' config.json) (required)"
          echo "  Require Daily:  $(jq -r '.mtf_settings.require_daily // true' config.json) ← DECISIVE FILTER"
          echo "  Require Weekly: $(jq -r '.mtf_settings.require_weekly // false' config.json) (bonus only)"
          echo "  NOTE: 30m and 1h REMOVED from MTF — signal is now on 1h chart"
          echo ""

          echo "[Gemini USD Gate]"
          echo "  Model:     $(jq -r '.gemini_usd_gate.model // "gemini-2.5-flash"' config.json)"
          echo "  Cache TTL: $(jq -r '.gemini_usd_gate.cache_minutes // 60' config.json) min"
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "  GEMINI_API_KEY: ✅ Active"
          else
            echo "  GEMINI_API_KEY: ❌ Missing — FinBERT fallback active"
          fi
          echo ""

          echo "[Sessions]"
          EU_H=$(jq -r '.sessions.european_start_hour // 9' config.json)
          EU_M=$(jq -r '.sessions.european_start_minute // 30' config.json)
          printf "  European start: %02d:%02d UTC\n" "$EU_H" "$EU_M"
          echo "  ASIAN:    blocked (threshold 999)"
          echo "  OVERLAP:  blocked (threshold 999)"
          echo "  LATE_US:  threshold $(jq -r '.advanced.session_thresholds.LATE_US // 60' config.json)"
          echo ""

          echo "[Tier Thresholds]"
          echo "  A+: >= $(jq -r '.tiers.A_plus_min_score // 80' config.json)"
          echo "  A:  >= $(jq -r '.tiers.A_min_score // 72' config.json)  BLOCKED (0% WR, -107 pips)"
          echo "  B:  >= $(jq -r '.tiers.B_min_score // 55' config.json)  ACTIVE — main trading tier"
          echo "  C:  below B — BLOCKED"
          echo ""

          echo "[Permanently Blocked Pairs]"
          echo "  EURUSD: 0 — 7t 0% WR -177p"
          echo "  EURGBP: 0 — no edge"
          echo "  GBPAUD: $(jq -r '.advanced.pair_limits.GBPAUD // 0' config.json) — 8t 0% WR -335p (v2.4.0)"
          echo "  GBPCAD: $(jq -r '.advanced.pair_limits.GBPCAD // 0' config.json) — 6t 0% WR -261p (v2.4.0)"
          echo ""

          echo "[Active Pair Caps]"
          echo "  GBPUSD: max $(jq -r '.advanced.pair_limits.GBPUSD // 5' config.json) (BUY-only)"
          echo "  GBPJPY: max $(jq -r '.advanced.pair_limits.GBPJPY // 1' config.json)"
          echo "  USD pairs: US session only + Gemini gate"
          echo ""

          echo "[Risk Management]"
          echo "  Max Daily Risk: $(jq -r '.risk_management.max_daily_risk_pips' config.json) pips"
          echo "  Max Open:       $(jq -r '.risk_management.max_open_positions' config.json)"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run Trade Beacon v2.5.0-1H-EXIT
        if: steps.market_check.outputs.should_run == 'true'
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}
        run: |
          echo "🚀 Starting Trade Beacon v2.5.0-1H-EXIT..."
          python $ENTRY_SCRIPT
          EXIT_CODE=$?

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Trade Beacon exited with error: $EXIT_CODE"
            exit $EXIT_CODE
          fi

          echo "✅ Trade Beacon completed successfully"

          if [ -f signal_state/dashboard_state.json ]; then
            echo ""
            echo "📊 Signal Breakdown:"
            AGG_COUNT=$(jq -r  '.active_signals_by_mode.aggressive // 0'  signal_state/dashboard_state.json)
            CONS_COUNT=$(jq -r '.active_signals_by_mode.conservative // 0' signal_state/dashboard_state.json)
            TOTAL=$(jq -r      '.active_signals // 0'                      signal_state/dashboard_state.json)
            SESSION=$(jq -r    '.session // "UNKNOWN"'                     signal_state/dashboard_state.json)
            GEMINI=$(jq -r     '.sentiment_engine // "disabled"'           signal_state/dashboard_state.json)
            EXIT_MODE=$(jq -r  '.system.exit_mode // "unknown"'            signal_state/dashboard_state.json)
            echo "  Aggressive:   $AGG_COUNT signals"
            echo "  Conservative: $CONS_COUNT signals"
            echo "  Total:        $TOTAL unique signals"
            echo "  Session:      $SESSION"
            echo "  USD Engine:   $GEMINI"
            echo "  Exit Mode:    $EXIT_MODE"
          fi

      - name: Validate output files
        if: always()
        run: |
          echo "🔍 Validating output files..."

          if [ -f signal_state/dashboard_state.json ]; then
            jq empty signal_state/dashboard_state.json || exit 1
            VERSION=$(jq -r    '.system.version // "unknown"'       signal_state/dashboard_state.json)
            TIMEFRAME=$(jq -r  '.system.timeframe // "unknown"'     signal_state/dashboard_state.json)
            EXIT_MODE=$(jq -r  '.system.exit_mode // "unknown"'     signal_state/dashboard_state.json)
            GEMINI=$(jq -r     '.gemini_engine // "unknown"'        signal_state/dashboard_state.json)
            BLOCKED=$(jq -r    '.system.permanently_blocked // []'  signal_state/dashboard_state.json)
            echo "✅ Dashboard valid | version=$VERSION | timeframe=$TIMEFRAME | USD=$GEMINI"
            echo "   Exit: $EXIT_MODE"
            echo "   Permanently blocked: $BLOCKED"
          else
            echo "⚠️ Dashboard state not found"
          fi

          if [ -f signal_state/health.json ]; then
            jq empty signal_state/health.json || exit 1
            STATUS=$(jq -r    '.status // "unknown"'                    signal_state/health.json)
            VERSION=$(jq -r   '.system_info.version // "unknown"'       signal_state/health.json)
            TF=$(jq -r        '.system_info.timeframe // "unknown"'     signal_state/health.json)
            EXIT_M=$(jq -r    '.system_info.exit_mode // "unknown"'     signal_state/health.json)
            echo "📊 Health: $STATUS | v$VERSION | TF: $TF | Exit: $EXIT_M"
          fi

          if [ -f signal_state/economic_calendar_cache.json ]; then
            EVENT_COUNT=$(jq -r '.events | length' signal_state/economic_calendar_cache.json 2>/dev/null || echo "0")
            echo "📅 Calendar: $EVENT_COUNT high-impact events cached"
          fi

      - name: Display performance summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 TRADE BEACON v2.5.0-1H-EXIT PERFORMANCE SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ -f signal_state/signal_history.json ]; then
            echo ""
            echo "📈 Overall Statistics:"
            jq -r '.stats |
              "Total Trades: \(.total_trades // 0)\n" +
              "Wins: \(.wins // 0) | Losses: \(.losses // 0) | Expired: \(.expired // 0)\n" +
              "Win Rate: \(.win_rate // 0)%\n" +
              "Total Pips: \(.total_pips // 0)\n" +
              "Avg Win: \(.avg_win_pips // 0) pips | Avg Loss: \(.avg_loss_pips // 0) pips\n" +
              "Expectancy: \(.expectancy_pips // 0) pips/trade"' \
              signal_state/signal_history.json || echo "Stats not available"

            echo ""
            echo "🎯 By Mode:"
            jq -r '.stats.by_mode // {} | to_entries[] |
              "\(.key | ascii_upcase): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json || echo "No mode data"

            echo ""
            echo "💱 By Pair (sorted by pips):"
            jq -r '.analytics.by_pair // {} | to_entries | sort_by(-.value.total_pips) | .[] |
              "\(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json || echo "No pair data"

            echo ""
            echo "📊 By Session:"
            jq -r '.analytics.by_session // {} | to_entries[] |
              "\(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json || echo "No session data"

            echo ""
            echo "🚪 Exit Reason Breakdown (v2.5.0):"
            jq -r '.analytics.by_exit_reason // {} | to_entries[] |
              "  [\(.key)]: \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json 2>/dev/null || echo "  No exit data yet (populates as signals resolve)"

            echo ""
            echo "🔀 MTF Confirmation:"
            jq -r '.analytics.by_mtf_confirmed // {} | to_entries[] |
              "  [\(.key)]: \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json 2>/dev/null || echo "  No MTF data"

            echo ""
            echo "🤖 Gemini USD Bias:"
            jq -r '.analytics.by_gemini_bias // {} | to_entries[] |
              "  [\(.key)]: \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json 2>/dev/null || echo "  No Gemini data yet"

            echo ""
            echo "🏆 By Tier:"
            jq -r '.analytics.by_tier // {} | to_entries | sort_by(.key) | .[] |
              "Tier \(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json || echo "No tier data"

            echo ""
            echo "🔀 Tier × Session:"
            jq -r '.analytics.cross_analytics.tier_by_session // {} | to_entries[] |
              "\(.value.tier) in \(.value.session): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json || echo "No cross data"
          else
            echo "⚠️ No performance history yet"
          fi

          echo ""
          if [ -f signal_state/dashboard_state.json ]; then
            echo "🔔 Active Signals:"
            echo "  Total:        $(jq -r '.active_signals // 0'                      signal_state/dashboard_state.json)"
            echo "  Aggressive:   $(jq -r '.active_signals_by_mode.aggressive // 0'   signal_state/dashboard_state.json)"
            echo "  Conservative: $(jq -r '.active_signals_by_mode.conservative // 0' signal_state/dashboard_state.json)"
          fi
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Check for alerts
        if: always()
        run: |
          if [ -f signal_state/health.json ]; then
            STATUS=$(jq -r '.status // "unknown"' signal_state/health.json)
            if [ "$STATUS" = "paused" ]; then
              echo "⚠️ ALERT: Trading PAUSED"
            elif [ "$STATUS" = "warning" ]; then
              echo "⚠️ WARNING: System issues"
              jq -r '.issues // [] | .[]' signal_state/health.json || true
            elif [ "$STATUS" != "ok" ]; then
              echo "❌ ERROR: $STATUS"
            fi
          fi

      - name: Commit state changes
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          git config user.name  "Trade Beacon v2.5.0 [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add signal_state/*.json signal_state/last_run.txt signal_state/last_success.txt \
                  config.json config.runtime.base.json signals.csv 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            TOTAL=$(jq -r   '.active_signals // 0'                      signal_state/dashboard_state.json 2>/dev/null || echo "0")
            AGG=$(jq -r     '.active_signals_by_mode.aggressive // 0'   signal_state/dashboard_state.json 2>/dev/null || echo "0")
            CONS=$(jq -r    '.active_signals_by_mode.conservative // 0' signal_state/dashboard_state.json 2>/dev/null || echo "0")
            SESSION=$(jq -r '.session // "UNKNOWN"'                     signal_state/dashboard_state.json 2>/dev/null || echo "UNKNOWN")

            git commit -m "📊 Trade Beacon v2.5.0-1H-EXIT [$TIMESTAMP]

            Session: $SESSION | Signals: $TOTAL (Agg: $AGG, Cons: $CONS)
            Exit: TP1@2.5xATR | 2h TimeStop | 45min MomentumCheck
            Run: #${{ github.run_number }}

            [skip ci]"

            echo "✅ Changes committed"
          fi

      - name: Push changes
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          git fetch origin main
          git merge -X ours origin/main --no-edit 2>/dev/null || {
            echo "⚠️ Merge failed — pushing with force-with-lease"
            git merge --abort 2>/dev/null || true
            git push --force-with-lease origin HEAD:main || {
              echo "⚠️ Push failed, will retry on next run"
              exit 0
            }
            echo "✅ Changes pushed (force)"
            exit 0
          }
          git push origin HEAD:main || {
            echo "⚠️ Push failed, will retry on next run"
            exit 0
          }
          echo "✅ Changes pushed"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        if: steps.market_check.outputs.should_run == 'true'
        with:
          name: trade-beacon-v2.5.0-run-${{ github.run_number }}
          path: |
            signal_state/
            signals.csv
            config.json
          retention-days: 30
          compression-level: 9
