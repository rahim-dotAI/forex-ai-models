name: Trade Beacon v2.1.6-OPTIMISED – Forex Signal Generator

# CHANGES v2.1.6-OPTIMISED:
# - HuggingFace API migrated: api-inference.huggingface.co → router.huggingface.co
# - BROWSERLESS_TOKEN secret added for X-Rates live price validation
# - Economic calendar: Forex Factory feed cached daily, blackout ±30/15min
# - Signal resolution fixed: checks high/low window, deduplicates, guards double-record
# - FinBERT sentiment via HF_API_KEY secret (replaces keyword counting)
# - Sentiment engine displayed in config summary and performance output
# - by_sentiment analytics block displayed in performance summary

# PERFORMANCE OPTIMIZATIONS v2.1.3 (carried forward):
# - Lowered tier thresholds (A+: 80, A: 68, B: 55) for expanded scorer
# - Balanced Conservative/Aggressive thresholds (55/50)
# - Session-specific thresholds (OVERLAP blocked 999, ASIAN raised)
# - Pair limits (max 2 GBPJPY, block EURGBP, allow 5 GBPUSD, max 1 NZDUSD)
# - ATR multipliers (stop 2.5x, target 7.0x → RR=2.8)
# - GBPUSD BUY-only directional filter

on:
  schedule:
    - cron: "*/15 * * * 1-5"

  repository_dispatch:
    types: [trade-signal-check, performance-check]

  workflow_dispatch:
    inputs:
      sentiment:
        description: 'Enable Sentiment Analysis (requires HF_API_KEY, NEWSAPI_KEY, MARKETAUX_API_KEY secrets)'
        required: false
        type: boolean
        default: false

      run_backtest:
        description: 'Run Backtest'
        required: false
        type: boolean
        default: false

      reset_performance:
        description: 'RESET PERFORMANCE (type YES to confirm)'
        required: false
        default: 'NO'

      allow_optimization:
        description: 'ALLOW threshold optimization (if min trades met)'
        required: false
        type: boolean
        default: false

      force_run:
        description: 'Force run even on weekends/holidays'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.10"
  ENTRY_SCRIPT: "trade_beacon.py"

concurrency:
  group: trade-beacon-v2.1.6-OPTIMISED-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  forex-trading:
    runs-on: ubuntu-22.04

    steps:
      - name: Check if market is open
        id: market_check
        run: |
          echo "🕐 Checking market status..."

          CURRENT_DAY=$(date -u +%u)
          CURRENT_HOUR=$(date -u +%H)
          CURRENT_DATE=$(date -u +%Y-%m-%d)

          HOLIDAYS=(
            "2025-01-01" "2025-04-18" "2025-04-21" "2025-05-26"
            "2025-07-04" "2025-08-25" "2025-11-27" "2025-12-25" "2025-12-26"
            "2026-01-01" "2026-01-19" "2026-02-16" "2026-04-03" "2026-04-06"
            "2026-05-04" "2026-05-25" "2026-07-03" "2026-08-31"
            "2026-11-26" "2026-12-25" "2026-12-28"
          )

          IS_HOLIDAY=false
          for holiday in "${HOLIDAYS[@]}"; do
            if [ "$CURRENT_DATE" = "$holiday" ]; then
              IS_HOLIDAY=true
              echo "📅 Today is a forex market holiday: $holiday"
              break
            fi
          done

          IS_WEEKEND=false
          if [ "$CURRENT_DAY" -eq 5 ] && [ "$CURRENT_HOUR" -ge 22 ]; then
            IS_WEEKEND=true; echo "📅 Weekend: Friday after 22:00 UTC"
          elif [ "$CURRENT_DAY" -eq 6 ]; then
            IS_WEEKEND=true; echo "📅 Weekend: Saturday"
          elif [ "$CURRENT_DAY" -eq 7 ] && [ "$CURRENT_HOUR" -lt 22 ]; then
            IS_WEEKEND=true; echo "📅 Weekend: Sunday before 22:00 UTC"
          fi

          FORCE_RUN="${{ github.event.inputs.force_run }}"
          if [ "$IS_HOLIDAY" = "true" ] || [ "$IS_WEEKEND" = "true" ]; then
            if [ "$FORCE_RUN" = "true" ]; then
              echo "⚠️ Market closed but FORCE RUN enabled"
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "🛑 Market CLOSED - skipping"
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "✅ Market OPEN - proceeding"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Market Closed Notice
        if: steps.market_check.outputs.should_run == 'false'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🛑 FOREX MARKET CLOSED - SKIPPING ALL STEPS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Current time: $(date -u +"%Y-%m-%d %H:%M UTC")"
          echo "Market hours: Sunday 22:00 UTC - Friday 22:00 UTC"
          echo "To force run: workflow_dispatch with force_run=true"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Checkout repository
        if: steps.market_check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Python environment
        if: steps.market_check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y jq bc

      - name: Verify system files
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🔍 Verifying critical files..."
          for f in $ENTRY_SCRIPT requirements.txt performance_tracker.py config.json; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing critical file: $f"
              exit 1
            fi
          done
          echo "✅ All critical files present"
          mkdir -p signal_state
          python -m py_compile $ENTRY_SCRIPT
          python -m py_compile performance_tracker.py
          echo "✅ Python syntax validation passed"

      - name: Validate tracker version alignment
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🔍 Validating version alignment..."
          TRACKER_VER=$(python -c "from performance_tracker import TRACKER_VERSION; print(TRACKER_VERSION)" 2>/dev/null || echo "unknown")
          BEACON_VER=$(grep -oP '"signal_generator_version":\s*"\K[^"]+' $ENTRY_SCRIPT | head -1 || echo "unknown")
          CONFIG_VER=$(jq -r '.version // "unknown"' config.json)

          echo "Tracker version: $TRACKER_VER"
          echo "Beacon version:  $BEACON_VER"
          echo "Config version:  $CONFIG_VER"

          if [[ "$BEACON_VER" == *"OPTIMISED"* ]] || [[ "$BEACON_VER" == *"FINBERT"* ]]; then
            echo "✅ v2.1.6-OPTIMISED detected"
          elif [[ "$TRACKER_VER" != "$BEACON_VER" ]]; then
            echo "⚠️ Version mismatch (non-fatal — auto-migration will handle)"
          else
            echo "✅ Versions aligned: $TRACKER_VER"
          fi

      - name: Validate configuration
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🔍 Validating config.json..."
          jq empty config.json || exit 1

          CONFIG_VER=$(jq -r '.version // "unknown"' config.json)
          echo "Config version: $CONFIG_VER"
          if [[ "$CONFIG_VER" == *"OPTIMISED"* ]] || [[ "$CONFIG_VER" == *"FINBERT"* ]]; then
            echo "✅ Config version: v2.1.6-OPTIMISED"
          else
            echo "⚠️ Config version not v2.1.6-OPTIMISED — please update config.json"
          fi

          # Required structure checks
          jq -e '.settings.aggressive'  config.json > /dev/null || { echo "❌ Missing aggressive settings"; exit 1; }
          jq -e '.settings.conservative' config.json > /dev/null || { echo "❌ Missing conservative settings"; exit 1; }
          jq -e '.tiers'                config.json > /dev/null || echo "⚠️ Tier thresholds not found - using defaults (A+:80, A:68, B:55)"
          jq -e '.advanced.session_thresholds' config.json > /dev/null || echo "⚠️ Session thresholds not found"
          jq -e '.advanced.pair_limits'        config.json > /dev/null || echo "⚠️ Pair limits not found"
          jq -e '.sentiment'                   config.json > /dev/null || echo "⚠️ Sentiment block not found"

          AGG_THRESH=$(jq -r  '.settings.aggressive.threshold // 50'    config.json)
          CONS_THRESH=$(jq -r '.settings.conservative.threshold // 55'  config.json)
          ATR_STOP=$(jq -r   '.settings.aggressive.atr_stop_multiplier // 2.5' config.json)
          MIN_RR=$(jq -r     '.settings.aggressive.min_risk_reward // 2.5'     config.json)
          SENT_THRESH=$(jq -r '.sentiment.min_score_threshold // 60'           config.json)

          echo "✅ Thresholds: Aggressive=$AGG_THRESH, Conservative=$CONS_THRESH"
          echo "✅ ATR Stop: ${ATR_STOP}x | Min R:R: ${MIN_RR} | Sentiment threshold: ${SENT_THRESH}"

          if [ ! -f config.runtime.base.json ]; then
            cp config.json config.runtime.base.json
            git add config.runtime.base.json 2>/dev/null || true
            echo "📸 Created config baseline snapshot"
          fi

          echo "✅ Configuration valid (v2.1.6-OPTIMISED)"

          MODE=$(jq -r '.mode // "conservative"' config.json)
          echo "ℹ️ Mode: $MODE — Both aggressive and conservative signals generated simultaneously"

      - name: Reset performance history (DESTRUCTIVE - guarded)
        if: github.event.inputs.reset_performance == 'YES'
        run: |
          echo "⚠️ PERFORMANCE RESET INITIATED"
          rm -f signal_state/signal_history.json
          rm -f signal_state/last_optimization.json
          rm -f signal_state/dashboard_state.json
          rm -f signal_state/trading_paused.json
          echo "🔥 PERFORMANCE RESET COMPLETE - All history cleared"

      - name: Clean stale pause files
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🧹 Checking for stale pause files..."
          if [ -f signal_state/trading_paused.json ]; then
            PAUSED_UNTIL=$(jq -r '.paused_until // "unknown"' signal_state/trading_paused.json)
            if [ "$PAUSED_UNTIL" != "unknown" ]; then
              PAUSE_TS=$(date -d "$PAUSED_UNTIL" +%s 2>/dev/null || echo "0")
              NOW_TS=$(date +%s)
              if [ "$NOW_TS" -gt "$PAUSE_TS" ]; then
                echo "⚠️ Expired pause file (until: $PAUSED_UNTIL) — removing"
                rm -f signal_state/trading_paused.json
                echo "✅ Stale pause file removed"
              else
                echo "⏸️ Valid pause active until: $PAUSED_UNTIL"
              fi
            fi
          else
            echo "✅ No pause file present"
          fi

      - name: Apply runtime overrides
        if: github.event.inputs.sentiment != ''
        run: |
          echo "⚙️ Applying runtime configuration..."
          SENTIMENT="${{ github.event.inputs.sentiment }}"
          [ -z "$SENTIMENT" ] && SENTIMENT="false"

          jq --argjson sentiment "$SENTIMENT" '.use_sentiment = $sentiment' \
            config.json > tmp.json && mv tmp.json config.json

          echo "✅ Configuration updated: sentiment=$SENTIMENT"

      - name: Allow threshold optimization (if eligible)
        if: github.event.inputs.allow_optimization == 'true'
        run: |
          echo "🔧 Allowing threshold optimization..."
          jq '.performance_tuning.auto_adjust_thresholds = true' \
            config.json > tmp.json && mv tmp.json config.json
          rm -f signal_state/last_optimization.json

          MIN_TRADES=$(jq -r '.performance_tuning.min_trades_for_optimization // 50' config.json)
          CURRENT_TRADES=$(jq -r '.stats.total_trades // 0' signal_state/signal_history.json 2>/dev/null || echo "0")
          echo "✅ Optimization enabled"
          echo "📊 Trades: $CURRENT_TRADES / $MIN_TRADES required"
          if [ "$CURRENT_TRADES" -ge "$MIN_TRADES" ]; then
            echo "   ✅ Threshold MET"
          else
            echo "   ⚠️ Need $((MIN_TRADES - CURRENT_TRADES)) more trades"
          fi

      - name: Pre-run health check
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "🏥 Running pre-flight health check..."

          if [ -f signal_state/trading_paused.json ]; then
            PAUSED_UNTIL=$(jq -r '.paused_until // "unknown"' signal_state/trading_paused.json)
            echo "⛔ Trading paused until: $PAUSED_UNTIL — skipping execution"
            echo "paused" > signal_state/run_status.txt
            exit 0
          fi

          if [ -f signal_state/signal_history.json ]; then
            echo "📊 Current Performance:"
            jq -r '.stats | "Total: \(.total_trades // 0) | WR: \(.win_rate // 0)% | Pips: \(.total_pips // 0) | Expectancy: \(.expectancy_pips // 0)"' \
              signal_state/signal_history.json || echo "No stats yet"

            if jq -e '.stats.by_mode' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "📊 Multi-Mode Breakdown:"
              echo "  Aggressive:   $(jq -r '.stats.by_mode.aggressive.trades // 0' signal_state/signal_history.json) trades, $(jq -r '.stats.by_mode.aggressive.win_rate // 0' signal_state/signal_history.json)% WR"
              echo "  Conservative: $(jq -r '.stats.by_mode.conservative.trades // 0' signal_state/signal_history.json) trades, $(jq -r '.stats.by_mode.conservative.win_rate // 0' signal_state/signal_history.json)% WR"
            fi

            if jq -e '.analytics.by_tier' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🏆 Tier Breakdown (A+≥80, A≥68, B≥55):"
              jq -r '.analytics.by_tier // {} | to_entries | sort_by(.key) | .[] |
                "  Tier \(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json 2>/dev/null || echo "  No tier data yet"
            fi

            if jq -e '.analytics.by_pair' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "💱 Pair Performance:"
              jq -r '.analytics.by_pair // {} | to_entries | sort_by(-.value.total_pips) | .[] |
                "  \(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json 2>/dev/null || echo "  No pair data"
            fi

            # FinBERT effectiveness preview
            if jq -e '.analytics.by_sentiment' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "💭 FinBERT Sentiment Effectiveness:"
              SENT_DATA=$(jq -r '.analytics.by_sentiment // {} | to_entries[] |
                "  [\(.key)]: \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json 2>/dev/null)
              if [ -n "$SENT_DATA" ]; then
                echo "$SENT_DATA"
              else
                echo "  No sentiment data yet (will populate as signals resolve)"
              fi
            fi
          fi

          echo ""
          echo "✅ Pre-flight check complete"

      - name: Display active configuration
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 ACTIVE CONFIGURATION — v2.1.6-OPTIMISED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          MODE=$(jq -r '.mode // "conservative"' config.json)
          echo "🎯 MULTI-MODE: Generating both Aggressive AND Conservative signals"
          echo ""

          echo "[Aggressive Mode]"
          echo "  Threshold: $(jq -r '.settings.aggressive.threshold' config.json)"
          echo "  Min ADX:   $(jq -r '.settings.aggressive.min_adx' config.json)"
          echo "  Min R:R:   $(jq -r '.settings.aggressive.min_risk_reward' config.json)"
          echo "  ATR Stop:  $(jq -r '.settings.aggressive.atr_stop_multiplier' config.json)x"
          echo "  ATR Target:$(jq -r '.settings.aggressive.atr_target_multiplier' config.json)x"
          echo "  Max Corr:  $(jq -r '.settings.aggressive.max_correlated_signals' config.json)"
          echo ""

          echo "[Conservative Mode]"
          echo "  Threshold: $(jq -r '.settings.conservative.threshold' config.json)"
          echo "  Min ADX:   $(jq -r '.settings.conservative.min_adx' config.json)"
          echo "  Min R:R:   $(jq -r '.settings.conservative.min_risk_reward' config.json)"
          echo "  ATR Stop:  $(jq -r '.settings.conservative.atr_stop_multiplier' config.json)x"
          echo "  ATR Target:$(jq -r '.settings.conservative.atr_target_multiplier' config.json)x"
          echo "  Max Corr:  $(jq -r '.settings.conservative.max_correlated_signals' config.json)"
          echo ""

          echo "[Tier Thresholds — v2.1.6-OPTIMISED]"
          echo "  A+: >= $(jq -r '.tiers.A_plus_min_score // 80' config.json)"
          echo "  A:  >= $(jq -r '.tiers.A_min_score // 68' config.json)"
          echo "  B:  >= $(jq -r '.tiers.B_min_score // 55' config.json)"
          echo "  C:  below B threshold"
          echo ""

          echo "[Session Thresholds]"
          echo "  EUROPEAN: $(jq -r '.advanced.session_thresholds.EUROPEAN // 50' config.json)"
          echo "  US:       $(jq -r '.advanced.session_thresholds.US // 50' config.json)"
          echo "  ASIAN:    $(jq -r '.advanced.session_thresholds.ASIAN // 60' config.json)"
          echo "  LATE_US:  $(jq -r '.advanced.session_thresholds.LATE_US // 55' config.json)"
          echo "  OVERLAP:  $(jq -r '.advanced.session_thresholds.OVERLAP // 999' config.json) (BLOCKED — 0% WR)"
          echo ""

          echo "[Pair Limits]"
          echo "  GBPUSD: max $(jq -r '.advanced.pair_limits.GBPUSD // 5' config.json) (BUY-only, 70% WR)"
          echo "  GBPJPY: max $(jq -r '.advanced.pair_limits.GBPJPY // 1' config.json) (34.1% WR live — reduced)"
          echo "  NZDUSD: max $(jq -r '.advanced.pair_limits.NZDUSD // 1' config.json) (monitoring)"
          echo "  EURGBP: $(jq -r '.advanced.pair_limits.EURGBP // 0' config.json) (BLOCKED — 0% WR)"
          echo "  Default: $(jq -r '.advanced.pair_limits.default // 3' config.json)"
          echo ""

          echo "[System]"
          echo "  Mode:                  $MODE"
          echo "  Sentiment:             $(jq -r '.use_sentiment' config.json)"
          echo "  Performance Tracking:  $(jq -r '.performance_tracking.enable' config.json)"
          echo "  Auto Optimization:     $(jq -r '.performance_tuning.auto_adjust_thresholds' config.json)"
          echo "  Session Filtering:     $(jq -r '.advanced.enable_session_filtering' config.json)"
          echo "  Correlation Filter:    $(jq -r '.advanced.enable_correlation_filter' config.json)"
          echo ""

          # Sentiment block — v2.1.5-FINBERT adds HF_API_KEY status
          SENTIMENT=$(jq -r '.use_sentiment' config.json)
          if [ "$SENTIMENT" = "true" ]; then
            echo "[Sentiment Analysis — FinBERT ENABLED]"
            # NewsAPI key
            if [ -n "$NEWSAPI_KEY" ]; then
              echo "  NewsAPI:      ✅ Configured"
            else
              echo "  NewsAPI:      ❌ Missing secret NEWSAPI_KEY"
            fi
            # MarketAux key
            if [ -n "$MARKETAUX_API_KEY" ]; then
              echo "  MarketAux:    ✅ Configured"
            else
              echo "  MarketAux:    ❌ Missing secret MARKETAUX_API_KEY"
            fi
            # HuggingFace key — NEW v2.1.5-FINBERT
            if [ -n "$HF_API_KEY" ]; then
              echo "  HF_API_KEY:   ✅ Configured (FinBERT active)"
            else
              echo "  HF_API_KEY:   ❌ Missing secret HF_API_KEY — FinBERT disabled, get token at huggingface.co/settings/tokens"
            fi
            SENT_THRESH=$(jq -r '.sentiment.min_score_threshold // 60' config.json)
            HF_MODEL=$(jq -r '.sentiment.hf_model_primary // "mrm8488/distilroberta-finetuned-financial-news-sentiment-analysis"' config.json)
            echo "  Min Score:    $SENT_THRESH (only signals >= $SENT_THRESH receive FinBERT analysis)"
            echo "  Model:        $HF_MODEL"
            echo "  API:          router.huggingface.co (migrated from api-inference)"
            echo "  Cache TTL:    $(jq -r '.sentiment.cache_ttl_minutes // 30' config.json) min"
            echo "  Max Adj Pts:  ±$(jq -r '.sentiment.max_adjustment_pts // 10' config.json) pts"
          else
            echo "[Sentiment Analysis — DISABLED]"
            echo "  To enable: set use_sentiment=true in config.json"
            echo "  Required secrets: HF_API_KEY, NEWSAPI_KEY, MARKETAUX_API_KEY"
          fi
          echo ""

          echo "[Economic Calendar]"
          echo "  Source:       Forex Factory weekly feed (plain HTTP — free)"
          echo "  Refresh:      Once per day, cached to signal_state/economic_calendar_cache.json"
          echo "  Blackout:     -30min / +15min around High-impact events"
          echo ""

          echo "[Live Price Validation]"
          if [ -n "$BROWSERLESS_TOKEN" ]; then
            echo "  Status:       ✅ Active — X-Rates via Browserless"
            echo "  Divergence:   Warns + updates entry if yfinance vs X-Rates >0.5%"
            echo "  Budget:       ~110 calls/month (free tier = 1000)"
          else
            echo "  Status:       ❌ Disabled — add BROWSERLESS_TOKEN secret"
          fi
          echo ""

          echo "[Risk Management]"
          echo "  Max Daily Risk:    $(jq -r '.risk_management.max_daily_risk_pips' config.json) pips"
          echo "  Max Open:          $(jq -r '.risk_management.max_open_positions' config.json)"
          echo "  Equity Protection: $(jq -r '.risk_management.equity_protection.enable' config.json)"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}

      - name: Run Trade Beacon v2.1.6-OPTIMISED
        if: steps.market_check.outputs.should_run == 'true'
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}
        run: |
          echo "🚀 Starting Trade Beacon v2.1.6-OPTIMISED..."
          python $ENTRY_SCRIPT
          EXIT_CODE=$?

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Trade Beacon exited with error: $EXIT_CODE"
            exit $EXIT_CODE
          fi

          echo "✅ Trade Beacon completed successfully"

          if [ -f signal_state/dashboard_state.json ]; then
            echo ""
            echo "📊 Signal Breakdown:"
            AGG_COUNT=$(jq -r  '.active_signals_by_mode.aggressive // 0'  signal_state/dashboard_state.json)
            CONS_COUNT=$(jq -r '.active_signals_by_mode.conservative // 0' signal_state/dashboard_state.json)
            TOTAL=$(jq -r      '.active_signals // 0'                      signal_state/dashboard_state.json)
            SENT_ENGINE=$(jq -r '.sentiment_engine // "disabled"'           signal_state/dashboard_state.json)
            echo "  Aggressive:   $AGG_COUNT signals"
            echo "  Conservative: $CONS_COUNT signals"
            echo "  Total:        $TOTAL unique signals"
            echo "  Sentiment:    $SENT_ENGINE"
          fi

          if [ -f signal_state/last_optimization.json ]; then
            echo ""
            echo "📊 Optimization Decision:"
            jq -r '"Old Threshold: \(.old // "N/A") -> New: \(.new // "N/A")"' \
              signal_state/last_optimization.json || true
          fi

      - name: Validate output files
        if: always()
        run: |
          echo "🔍 Validating output files..."

          if [ -f signal_state/dashboard_state.json ]; then
            jq empty signal_state/dashboard_state.json || exit 1
            if jq -e '.multi_mode == true' signal_state/dashboard_state.json > /dev/null 2>&1; then
              echo "✅ Dashboard valid (multi_mode=true)"
            else
              echo "⚠️ Dashboard missing multi_mode=true"
            fi
            VERSION=$(jq -r '.system.version // "unknown"' signal_state/dashboard_state.json)
            echo "📋 Dashboard version: $VERSION"
          else
            echo "⚠️ Dashboard state not found"
          fi

          if [ -f signal_state/health.json ]; then
            jq empty signal_state/health.json || exit 1
            STATUS=$(jq -r  '.status // "unknown"'              signal_state/health.json)
            VERSION=$(jq -r '.system_info.version // "unknown"' signal_state/health.json)
            HF_ST=$(jq -r   '.api_status.finbert_hf // "unknown"' signal_state/health.json)
            echo "📊 Health: $STATUS | Version: $VERSION | FinBERT: $HF_ST"
          fi

          # Calendar cache status
          if [ -f signal_state/economic_calendar_cache.json ]; then
            EVENT_COUNT=$(jq -r '.events | length' signal_state/economic_calendar_cache.json 2>/dev/null || echo "0")
            CACHED_AT=$(jq -r '.cached_at // "unknown"' signal_state/economic_calendar_cache.json 2>/dev/null || echo "unknown")
            echo "📅 Calendar: $EVENT_COUNT high-impact events cached (at $CACHED_AT)"
          else
            echo "📅 Calendar: not yet cached (will fetch on first run)"
          fi

      - name: Display comprehensive performance summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 TRADE BEACON v2.1.6-OPTIMISED PERFORMANCE SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ -f signal_state/signal_history.json ]; then
            echo ""
            echo "📈 Overall Statistics:"
            jq -r '.stats |
              "Total Trades: \(.total_trades // 0)\n" +
              "Resolved: \(.total_resolved // 0)\n" +
              "Wins: \(.wins // 0)\n" +
              "Losses: \(.losses // 0)\n" +
              "Expired: \(.expired // 0)\n" +
              "Win Rate: \(.win_rate // 0)%\n" +
              "Total Pips: \(.total_pips // 0)\n" +
              "Avg Win: \(.avg_win // 0) pips\n" +
              "Avg Loss: \(.avg_loss // 0) pips\n" +
              "Expectancy: \(.expectancy_pips // 0) pips/trade\n" +
              "Validated (100+ trades): \(.validated // false)"' \
              signal_state/signal_history.json || echo "Stats not available"

            if jq -e '.stats.by_mode' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🎯 Performance by Mode:"
              jq -r '.stats.by_mode // {} | to_entries[] |
                "\(.key | ascii_upcase): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json || echo "No mode data"
            fi

            if jq -e '.analytics.by_tier' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🏆 Performance by Tier (A+≥80, A≥68, B≥55):"
              jq -r '.analytics.by_tier // {} | to_entries | sort_by(.key) | .[] |
                "Tier \(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json || echo "No tier data"
            fi

            echo ""
            echo "💱 Analytics by Pair (sorted by pips):"
            jq -r '.analytics.by_pair // {} | to_entries | sort_by(-.value.total_pips) | .[] |
              "\(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json || echo "No pair data"

            echo ""
            echo "📊 Analytics by Session:"
            jq -r '.analytics.by_session // {} | to_entries[] |
              "\(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json || echo "No session data"

            echo ""
            echo "🎯 Analytics by Confidence:"
            jq -r '.analytics.by_confidence // {} | to_entries[] |
              "\(.key): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
              signal_state/signal_history.json || echo "No confidence data"

            # FinBERT sentiment effectiveness
            if jq -e '.analytics.by_sentiment' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "💭 FinBERT Sentiment Effectiveness:"
              SENT_DATA=$(jq -r '.analytics.by_sentiment // {} | to_entries[] |
                "[\(.key)]: \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips (engine: \(.value.engine // "none"))"' \
                signal_state/signal_history.json 2>/dev/null)
              if [ -n "$SENT_DATA" ]; then
                echo "$SENT_DATA"
              else
                echo "No sentiment data yet (will populate as FinBERT-analysed signals resolve)"
              fi
            fi

            if jq -e '.analytics.cross_analytics.tier_by_session' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🔀 Cross Analytics (Tier × Session):"
              jq -r '.analytics.cross_analytics.tier_by_session // {} | to_entries[] |
                "\(.value.tier) in \(.value.session): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json || echo "No cross-analytics data"
            fi

            if jq -e '.analytics.cross_analytics.mode_by_tier' signal_state/signal_history.json > /dev/null 2>&1; then
              echo ""
              echo "🔀 Cross Analytics (Mode × Tier):"
              jq -r '.analytics.cross_analytics.mode_by_tier // {} | to_entries[] |
                "\(.value.mode) / Tier \(.value.tier): \(.value.trades // 0) trades, \(.value.win_rate // 0)% WR, \(.value.total_pips // 0) pips"' \
                signal_state/signal_history.json || echo "No cross-analytics data"
            fi
          else
            echo "⚠️ No performance history available yet"
          fi

          echo ""
          if [ -f signal_state/dashboard_state.json ]; then
            echo "🔔 Active Signals:"
            echo "  Total:        $(jq -r '.active_signals // 0' signal_state/dashboard_state.json)"
            echo "  Aggressive:   $(jq -r '.active_signals_by_mode.aggressive // 0' signal_state/dashboard_state.json)"
            echo "  Conservative: $(jq -r '.active_signals_by_mode.conservative // 0' signal_state/dashboard_state.json)"
            echo "  Sentiment:    $(jq -r '.sentiment_engine // "disabled"' signal_state/dashboard_state.json)"

            echo ""
            echo "📡 System Status:"
            jq -r '.system |
              "Version: \(.version // "unknown")\n" +
              "Signal Only Mode: \(.signal_only_mode // true)"' \
              signal_state/dashboard_state.json || echo "Status not available"
          fi
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Check for alerts
        if: always()
        run: |
          if [ -f signal_state/health.json ]; then
            STATUS=$(jq -r '.status // "unknown"' signal_state/health.json)
            if [ "$STATUS" = "paused" ]; then
              echo "⚠️ ALERT: Trading PAUSED"
              jq -r '.issues // [] | .[]' signal_state/health.json || true
            elif [ "$STATUS" = "warning" ]; then
              echo "⚠️ WARNING: System issues detected"
              jq -r '.issues // [] | .[]' signal_state/health.json || true
            elif [ "$STATUS" != "ok" ]; then
              echo "❌ ERROR: System in bad state: $STATUS"
              jq -r '.issues // [] | .[]' signal_state/health.json || true
            fi
          fi

      - name: Commit state changes
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          git config user.name  "Trade Beacon v2.1.6-OPTIMISED [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add signal_state/*.json config.json config.runtime.base.json signals.csv 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            TOTAL=$(jq -r    '.active_signals // 0'                      signal_state/dashboard_state.json 2>/dev/null || echo "0")
            AGG=$(jq -r      '.active_signals_by_mode.aggressive // 0'   signal_state/dashboard_state.json 2>/dev/null || echo "0")
            CONS=$(jq -r     '.active_signals_by_mode.conservative // 0' signal_state/dashboard_state.json 2>/dev/null || echo "0")
            SESSION=$(jq -r  '.session // "UNKNOWN"'                     signal_state/dashboard_state.json 2>/dev/null || echo "UNKNOWN")
            SENT=$(jq -r     '.sentiment_engine // "disabled"'            signal_state/dashboard_state.json 2>/dev/null || echo "disabled")
            MODE=$(jq -r     '.mode // "conservative"'                   config.json)

            git commit -m "📊 Trade Beacon v2.1.6-OPTIMISED [$TIMESTAMP]

            Mode: $MODE | Session: $SESSION | Sentiment: $SENT
            Signals: $TOTAL (Agg: $AGG, Cons: $CONS)
            Run: #${{ github.run_number }}

            [skip ci]"

            echo "✅ Changes committed"
          fi

      - name: Push changes
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          git push origin HEAD:main || {
            echo "⚠️ Push failed, will retry on next run"
            exit 0
          }
          echo "✅ Changes pushed"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: steps.market_check.outputs.should_run == 'true'
        with:
          name: trade-beacon-v2.1.6-OPTIMISED-run-${{ github.run_number }}
          path: |
            signal_state/
            signals.csv
            config.json
          retention-days: 30
          compression-level: 9
